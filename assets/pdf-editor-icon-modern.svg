<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- グラデーション定義 -->
    <linearGradient id="pdfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <!-- シャドウフィルター -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- PDF書類 -->
  <g filter="url(#shadow)">
    <!-- メイン書類 -->
    <rect x="20" y="15" width="70" height="95" rx="4" fill="url(#pdfGrad)"/>
    
    <!-- 折り目 -->
    <path d="M 75 15 L 90 15 L 90 30 Z" fill="#c0392b"/>
    <path d="M 90 15 L 90 30 L 75 30" fill="none" stroke="#a93226" stroke-width="1.5"/>
    
    <!-- 書類の線（テキスト表現） -->
    <rect x="30" y="55" width="50" height="3" rx="1.5" fill="white" opacity="0.8"/>
    <rect x="30" y="62" width="45" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="30" y="69" width="48" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="30" y="76" width="42" height="3" rx="1.5" fill="white" opacity="0.7"/>
    
    <!-- PDF テキスト -->
    <text x="55" y="42" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">PDF</text>
  </g>
  
  <!-- 編集ペン -->
  <g filter="url(#shadow)">
    <g transform="translate(75, 75) rotate(-45)">
      <!-- ペン本体 -->
      <rect x="-5" y="-25" width="10" height="35" rx="2" fill="url(#penGrad)"/>
      
      <!-- ペン先（金属部分） -->
      <polygon points="0,10 -5,15 5,15" fill="#95a5a6"/>
      <polygon points="0,15 -3,20 3,20" fill="#7f8c8d"/>
      
      <!-- ペン先端 -->
      <polygon points="0,20 -2,23 2,23" fill="#2c3e50"/>
      
      <!-- ペンのクリップ -->
      <rect x="-1" y="-20" width="2" height="10" rx="1" fill="#ecf0f1" opacity="0.8"/>
      
      <!-- ハイライト -->
      <rect x="-3" y="-18" width="2" height="15" rx="1" fill="white" opacity="0.4"/>
    </g>
  </g>
  
  <!-- 編集マーク（sparkle効果） -->
  <g opacity="0.6">
    <circle cx="95" cy="55" r="2" fill="#f39c12"/>
    <circle cx="88" cy="48" r="1.5" fill="#f39c12"/>
    <circle cx="100" cy="50" r="1.5" fill="#f39c12"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景円（オプション） -->
  <circle cx="100" cy="100" r="95" fill="#ecf0f1" opacity="0.5"/>
  
  <!-- PDF書類 -->
  <rect x="50" y="40" width="80" height="110" rx="5" fill="#e74c3c"/>
  
  <!-- 折り目 -->
  <path d="M 110 40 L 130 40 L 130 60 Z" fill="#c0392b"/>
  <line x1="130" y1="40" x2="130" y2="60" stroke="#a93226" stroke-width="2"/>
  <line x1="130" y1="60" x2="110" y2="60" stroke="#a93226" stroke-width="2"/>
  
  <!-- PDFアイコン内のテキストライン -->
  <rect x="65" y="90" width="50" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="65" y="100" width="50" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="65" y="110" width="40" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="65" y="120" width="45" height="4" rx="2" fill="white" opacity="0.9"/>
  
  <!-- PDFテキスト -->
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">PDF</text>
  
  <!-- 編集ペン（大きめ） -->
  <g transform="translate(130, 130)">
    <!-- ペン本体 -->
    <rect x="-8" y="-35" width="16" height="45" rx="2" fill="#3498db" transform="rotate(-45)"/>
    
    <!-- ペン先の金属部分 -->
    <polygon points="0,15 -8,22 8,22" fill="#95a5a6" transform="rotate(-45)"/>
    
    <!-- ペン先端 -->
    <polygon points="0,22 -5,28 5,28" fill="#7f8c8d" transform="rotate(-45)"/>
    <polygon points="0,28 -3,32 3,32" fill="#2c3e50" transform="rotate(-45)"/>
    
    <!-- ペンのクリップ -->
    <ellipse cx="-10" cy="-15" rx="2" ry="8" fill="#ecf0f1" opacity="0.8" transform="rotate(-45)"/>
  </g>
  
  <!-- 編集エフェクト（星マーク） -->
  <g opacity="0.7">
    <path d="M 145 100 l 3 0 l 1 3 l 1 -3 l 3 0 l -2 -2 l 1 -3 l -3 1 l -2 -2 l 1 3 z" fill="#f39c12"/>
    <path d="M 155 85 l 2 0 l 0.5 2 l 0.5 -2 l 2 0 l -1.5 -1.5 l 0.5 -2 l -2 0.5 l -1.5 -1.5 l 0.5 2 z" fill="#f39c12"/>
    <path d="M 140 110 l 2 0 l 0.5 2 l 0.5 -2 l 2 0 l -1.5 -1.5 l 0.5 -2 l -2 0.5 l -1.5 -1.5 l 0.5 2 z" fill="#f39c12"/>
  </g>
</svg>
